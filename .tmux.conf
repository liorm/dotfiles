# -- Prefix -------------------------------------------------------------------
unbind C-b
set -g prefix §
set -g prefix2 ±
bind -T root § send-prefix
bind -T root ± send-prefix
set -sg repeat-time 1000
set -sg prefix-timeout 500
set -sg escape-time 500

# -- General ------------------------------------------------------------------
bind r display-message "tmux config reloaded" \; source-file ~/.tmux.conf

set -g mouse on

set -g default-terminal "screen-256color"

set -s focus-events on

set -g history-limit 10000

# -- display -------------------------------------------------------------------
set -g base-index 1 # start windows numbering at 1
setw -g pane-base-index 1 # make pane numbering consistent with windows

setw -g automatic-rename on # rename window to reflect current program
set -g renumber-windows on # renumber windows when a window is closed

set -g set-titles on # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000 # slightly longer status messages display time

set -g status-interval 10 # redraw status line every 10 seconds
set -g status-position bottom # status line at the bottom

# activity
set -g monitor-activity on
set -g visual-activity on

set -g status-interval 5

# -- Theme: Dracula (no TPM) --------------------------------------------------
# Dracula palette
set -g @dracula-white "#f8f8f2"
set -g @dracula-gray "#44475a"
set -g @dracula-dark-gray "#282a36"
set -g @dracula-light-purple "#bd93f9"
set -g @dracula-dark-purple "#6272a4"
set -g @dracula-green "#50fa7b"
set -g @dracula-yellow "#f1fa8c"

# Pane borders
set -g pane-active-border-style "fg=#6272a4"
set -g pane-border-style "fg=#44475a"

# Message/command line
set -g message-style "bg=#44475a,fg=#f8f8f2"

# Status bar
set -g status-style "bg=#44475a,fg=#f8f8f2"
set -g status-left "#[bg=#50fa7b]#[fg=#282a36]#{?client_prefix,#[bg=#f1fa8c],} #S #[fg=#44475a]#[bg=#44475a]"
set -g status-right "#[fg=#f8f8f2]%Y-%m-%d %H:%M "

# Window list: "#I <window_name>|<pane_title (OSC 0/2)>"
set -g window-status-current-format "#[fg=#f8f8f2]#[bg=#6272a4] #I #W#{?#{pane_title},|#{pane_title},}#{?window_activity_flag,*,}#{?window_zoomed_flag,Z,} "
set -g window-status-format "#[fg=#f8f8f2]#[bg=#44475a] #I #W#{?#{pane_title},|#{pane_title},}#{?window_activity_flag,*,}#{?window_zoomed_flag,Z,} "
set -g window-status-activity-style "bold"
set -g window-status-bell-style "bold"

# -- Navigation -------------------------------------------------------------

# Split panes
bind - split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# # Navigation, and display pane indicators
bind -r -T prefix  Up          select-pane -U \; display-panes -b
bind -r -T prefix  Down        select-pane -D \; display-panes -b
bind -r -T prefix  Left        select-pane -L \; display-panes -b
bind -r -T prefix  Right       select-pane -R \; display-panes -b

# # Navigation, and display pane indicators
bind -r -T prefix  S-Left        select-window -p
bind -r -T prefix  S-Right       select-window -n

